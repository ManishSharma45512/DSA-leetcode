name: Update Problem Count

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count solved problems
        id: count
        run: |
          # Counts every .cpp file in the repo root (excludes README and folders like .github)
          COUNT=$(find . -maxdepth 1 -type f -name "*.cpp" | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Update README badge + stats table
        run: |
          COUNT=${{ steps.count.outputs.count }}
          sed -i "s|<!--PROBLEM_COUNT-->.*<!--END_PROBLEM_COUNT-->|<!--PROBLEM_COUNT-->${COUNT}<!--END_PROBLEM_COUNT-->|g" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto-update problem count [skip ci]"
          git push
